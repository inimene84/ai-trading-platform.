# QuantumTrade Pro — Hostinger VPS Deployment Stack
# Uses the databases you already have + adds the app tier
#
# INFRASTRUCTURE YOU ALREADY HAVE:
#   • VPS Docker: InfluxDB + Grafana + Postgres (move to this compose)
#   • Webhost Remote MySQL: 25GB (keep for warehouse/backups)
#
# RUN:
#   docker compose up -d

version: "3.9"

services:
  # ── Primary App Database ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: quantum
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: quantumtrade
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantum -d quantumtrade"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Time-Series Database ─────────────────────────────────────────────────
  influxdb:
    image: influxdb:2.7-alpine
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme}
      DOCKER_INFLUXDB_INIT_ORG: quantum
      DOCKER_INFLUXDB_INIT_BUCKET: trading
    volumes:
      - influxdata:/var/lib/influxdb2
    ports:
      - "127.0.0.1:8086:8086"

  # ── Monitoring Dashboards ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-changeme}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafanadata:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - influxdb
      - postgres

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://quantum:${POSTGRES_PASSWORD:-changeme}@postgres:5432/quantumtrade
      INFLUXDB_URL: http://influxdb:8086
      INFLUXDB_TOKEN: ${INFLUX_TOKEN:-}
      INFLUXDB_ORG: quantum
      INFLUXDB_BUCKET: trading
      # Remote MySQL (your 25GB Hostinger webhost DB)
      MYSQL_WAREHOUSE_URL: ${MYSQL_WAREHOUSE_URL:-}
      # Broker keys (pass through from host env)
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      CTRADER_ACCESS_TOKEN: ${CTRADER_ACCESS_TOKEN:-}
    ports:
      - "127.0.0.1:8001:8000"  # Changed from 8000 to avoid WSL port conflict
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend:ro
      # Persist SQLite backups if any
      - appdata:/app/data

  # ── Nginx (Frontend + Reverse Proxy) ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - certdata:/etc/letsencrypt
    depends_on:
      - backend

volumes:
  pgdata:
  influxdata:
  grafanadata:
  appdata:
  certdata:
