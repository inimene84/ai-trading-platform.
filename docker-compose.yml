services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-trading-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      OLLAMA_BASE_URL: http://litellm:4000
      PAPER_TRADING: false
      ACTIVE_BROKER: binance_futures
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      BINANCE_TESTNET: false
      BINANCE_DRY_RUN: false
      DRY_RUN_ALL: false
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      KIE_API_KEY: ${KIE_API_KEY}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      # Personas: KieAI Gemini 3 Flash via VPS LiteLLM proxy (cheap, 1h cache)
      PERSONA_LLM_PROVIDER: litellm
      PERSONA_LLM_MODEL: gemini-3-flash
      PERSONA_LLM_BASE_URL: http://litellm:4000/v1
      # Safety: risk guard ENABLED by default. Only disable for explicit testing by setting DISABLE_RISK_GUARD=true in .env
      DISABLE_RISK_GUARD: ${DISABLE_RISK_GUARD:-false}
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 6G
        reservations:
          cpus: 0.5
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - 8001:8000
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    networks:
      - trading-net
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-trading-litellm
    environment:
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      KIE_API_KEY: ${KIE_API_KEY}
      KIE_BEARER_TOKEN: "Bearer ${KIE_API_KEY}"
      LITELLM_MODEL_FALLBACK: true
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY}
    command: --config /tmp/litellm-config.yaml --port 4000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - 4001:4000
    volumes:
      - ./litellm-config.yaml:/tmp/litellm-config.yaml:ro
    networks:
      - trading-net
  redis:
    image: redis:7-alpine
    container_name: ai-trading-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - trading-net
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: vps-qdrant
    restart: unless-stopped
    ports:
      - 6333:6333 # For local testing, backend uses Docker network
    volumes:
      - ./qdrant-storage:/qdrant/storage
    networks:
      - trading-net
  influxdb:
    image: influxdb:2.7
    container_name: vps-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=hedgefund123
      - DOCKER_INFLUXDB_INIT_ORG=hedge-fund
      - DOCKER_INFLUXDB_INIT_BUCKET=news-sentiment
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    restart: unless-stopped
    ports:
      - 8086:8086
    volumes:
      - influxdb-storage:/var/lib/influxdb2
    networks:
      - trading-net
      - n8n_default
  nginx:
    image: nginx:alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - 8081:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - trading-net
networks:
  trading-net:
    external: true
  n8n_default:
    external: true
volumes:
  app-data: 
  app-logs: 
  redis-data: 
  influxdb-storage:
