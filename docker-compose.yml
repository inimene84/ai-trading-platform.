services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-trading-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      OLLAMA_BASE_URL: http://litellm:4000
      PAPER_TRADING: false
      ACTIVE_BROKER: binance_futures
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      BINANCE_TESTNET: false
      BINANCE_DRY_RUN: false
      DRY_RUN_ALL: false
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      KIE_API_KEY: ${KIE_API_KEY}
      KIE_MODEL: claude-sonnet-4-6
      KIE_OPUS_MODEL: ${KIE_OPUS_MODEL:-claude-opus-4-6}
      LITELLM_API_KEY: ${LITELLM_API_KEY}
      # PRIMARY LLM: Kie.ai Claude Sonnet 4.6 via LiteLLM proxy
      PERSONA_LLM_PROVIDER: ${PERSONA_LLM_PROVIDER:-kie}
      PERSONA_LLM_MODEL: ${PERSONA_LLM_MODEL:-claude-sonnet-4-6}
      PERSONA_LLM_BASE_URL: ${PERSONA_LLM_BASE_URL:-https://api.kie.ai/claude}
      # Safety: risk guard ENABLED by default. Only disable for explicit testing by setting DISABLE_RISK_GUARD=true in .env
      DISABLE_RISK_GUARD: ${DISABLE_RISK_GUARD:-false}
      # MiCA/EEA: trade USDC-margined perpetuals (USDT restricted for EU users).
      # Override via TRADING_SYMBOLS in .env. ADA dropped (weekly loss leader).
      TRADING_SYMBOLS: ${TRADING_SYMBOLS:-BTCUSDC,ETHUSDC,SOLUSDC,BNBUSDC,XRPUSDC,AVAXUSDC,LINKUSDC,UNIUSDC}
      # Liquidity floor. 3M keeps USDC majors (USDC books are thinner than
      # USDT twins; 50M would silently drop AVAX/LINK/UNI). Override in .env.
      MIN_24H_QUOTE_VOLUME_USDT: ${MIN_24H_QUOTE_VOLUME_USDT:-3000000}
      # Payoff geometry. TRAIL_ATR_MULT MUST be < TRAIL_ACTIVATION_ATR.
      SL_ATR_MULT: ${SL_ATR_MULT:-1.0}
      TP_ATR_MULT: ${TP_ATR_MULT:-2.5}
      TRAIL_ACTIVATION_ATR: ${TRAIL_ACTIVATION_ATR:-2.0}
      TRAIL_ATR_MULT: ${TRAIL_ATR_MULT:-0.8}
      STEP_TRAIL_ENABLED: ${STEP_TRAIL_ENABLED:-false}
      RISK_MAX_DRAWDOWN_PCT: ${RISK_MAX_DRAWDOWN_PCT:-20}
      RISK_MAX_DAILY_LOSS_PCT: ${RISK_MAX_DAILY_LOSS_PCT:-5}
      RISK_PEAK_LOOKBACK_HOURS: ${RISK_PEAK_LOOKBACK_HOURS:-72}
      PYRAMID_MAX_LAYERS: ${PYRAMID_MAX_LAYERS:-2}
      PYRAMID_BLOCK_UNDERWATER: ${PYRAMID_BLOCK_UNDERWATER:-true}
      MAX_SAME_DIRECTION_POSITIONS: ${MAX_SAME_DIRECTION_POSITIONS:-3}
      # Fee-churn fix: post-only (GTX) maker entries with MARKET fallback.
      # OFF by default (fail-safe). Set true to cut entry fees 0.05%->0.02%.
      MAKER_ENTRY_ENABLED: ${MAKER_ENTRY_ENABLED:-true}
      MAKER_WAIT_SEC: ${MAKER_WAIT_SEC:-8}
    command:
      - uvicorn
      - backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 6G
        reservations:
          cpus: 0.5
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - "127.0.0.1:8001:8000"
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
      - ./.env:/app/.env
    networks:
      - trading-net
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-trading-litellm
    environment:
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      KIE_API_KEY: ${KIE_API_KEY}
      KIE_BEARER_TOKEN: "Bearer ${KIE_API_KEY}"
      KIE_MODEL: claude-sonnet-4-6
      KIE_OPUS_MODEL: ${KIE_OPUS_MODEL:-claude-opus-4-6}
      LITELLM_MODEL_FALLBACK: true
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:?LITELLM_API_KEY must be set}
    command: --config /tmp/litellm-config.yaml --port 4000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - "127.0.0.1:4001:4000"
    volumes:
      - ./litellm-config.yaml:/tmp/litellm-config.yaml:ro
    networks:
      - trading-net
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: vps-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333" # local diagnostics; backend uses Docker network
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?QDRANT_API_KEY must be set}
    volumes:
      - ./qdrant-storage:/qdrant/storage
    networks:
      - trading-net
  influxdb:
    image: influxdb:2.7
    container_name: vps-influxdb
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:?set INFLUXDB_ADMIN_PASSWORD in .env}
      - DOCKER_INFLUXDB_INIT_ORG=hedge-fund
      - DOCKER_INFLUXDB_INIT_BUCKET=news-sentiment
      - DOCKER_INFLUXDB_INIT_RETENTION=7d
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - influxdb-storage:/var/lib/influxdb2
    networks:
      - trading-net
      - n8n_default
  nginx:
    image: nginx:alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - 8081:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - trading-net
  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: ai-trading-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:9100:9100"
    environment:
      - BACKEND_BASE_URL=http://ai-trading-backend:8000
      - BACKEND_API_PREFIX=/api
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9100
      - MCP_API_TOKEN=${ADMIN_API_KEY:?ADMIN_API_KEY must be set}
    networks:
      - trading-net
    depends_on:
      - backend
  kronos-infer:
    build:
      context: ./kronos-infer
      dockerfile: Dockerfile
    container_name: ai-trading-kronos
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - KRONOS_MODEL=NeoQuasar/Kronos-mini
      - KRONOS_TOKENIZER=NeoQuasar/Kronos-Tokenizer-2k
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - trading-net
networks:

  trading-net:
    external: true
  n8n_default:
    external: true
volumes:
  app-data: 
  app-logs: 
  influxdb-storage:
