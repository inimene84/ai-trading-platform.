name: VPS Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - ".github/workflows/**"
      - "scripts/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'inimene84/ai-trading-platform.'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not configured in GitHub repo settings."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST || '72.60.18.113' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '72.60.18.113' }}
          SSH_USER: ${{ secrets.SSH_USER || 'root' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" 'bash -s' << 'REMOTE'
          set -euo pipefail
          PROJECT_DIR="${PROJECT_DIR:-/root/ai-trading-platform-v3}"
          cd "$PROJECT_DIR"
          git fetch origin main && git checkout main && git pull origin main
          chmod +x scripts/hostinger_vps_apply.sh scripts/lib/vps_ssh_hygiene.sh 2>/dev/null || true
          PROJECT_DIR="$PROJECT_DIR" ./scripts/hostinger_vps_apply.sh
          REMOTE
