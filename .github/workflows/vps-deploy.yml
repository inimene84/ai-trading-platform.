name: VPS Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "backend/services/risk_reviewer.py"
      - "backend/services/decision_engine.py"
      - "scripts/vps_deploy_risk_reviewer_fix.sh"
      - "scripts/hostinger_vps_apply.sh"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'inimene84/ai-trading-platform.'
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::SSH_PRIVATE_KEY secret is not configured in GitHub repo settings."
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST || '72.60.18.113' }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy to VPS
        env:
          SSH_HOST: ${{ secrets.SSH_HOST || '72.60.18.113' }}
          SSH_USER: ${{ secrets.SSH_USER || 'root' }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${SSH_HOST}" 'bash -s' << 'REMOTE'
          set -euo pipefail
          PROJECT_DIR="${PROJECT_DIR:-/root/ai-trading-platform-v3}"
          CLOUD_AGENT_PUBKEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIMPdc81hu58Qrgt5ODe8OvMJmqrM11GB848GmSqj1d7t valgutom@gmail.com"
          chown root:root /root && chmod 700 /root
          mkdir -p /root/.ssh && chmod 700 /root/.ssh
          touch /root/.ssh/authorized_keys && chmod 600 /root/.ssh/authorized_keys
          grep -vF "$CLOUD_AGENT_PUBKEY" /root/.ssh/authorized_keys > /tmp/ak_clean || true
          printf '%s\n' "$CLOUD_AGENT_PUBKEY" >> /tmp/ak_clean
          mv /tmp/ak_clean /root/.ssh/authorized_keys
          chmod 600 /root/.ssh/authorized_keys
          cd "$PROJECT_DIR"
          git fetch origin main && git checkout main && git pull origin main
          git log -1 --oneline
          COMPOSE_FILE="docker-compose.prod.yml"
          [[ -f "$COMPOSE_FILE" ]] || COMPOSE_FILE="docker-compose.yml"
          docker compose -f "$COMPOSE_FILE" up -d --build backend
          for i in $(seq 1 24); do
            curl -sf http://127.0.0.1:8001/health >/dev/null && break
            sleep 5
          done
          curl -sf -X POST http://127.0.0.1:8001/trading/config/update \
            -H 'Content-Type: application/json' \
            -d '{"use_risk_reviewer_llm": true, "enable_personas": false}'
          curl -sf http://127.0.0.1:8001/trading/config
          REMOTE
