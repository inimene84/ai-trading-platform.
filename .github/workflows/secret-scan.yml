name: Secret Scan

# Server-side safety net behind the local pre-commit hook. Blocks PRs that
# introduce new secrets. Requires the GITGUARDIAN_API_KEY repo secret
# (Settings -> Secrets and variables -> Actions).
on:
  push:
  pull_request:

jobs:
  ggshield:
    name: GitGuardian scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # ggshield needs full history to diff

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  detect-secrets:
    name: detect-secrets (offline)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Scan tracked files against baseline
        run: |
          git ls-files -z | xargs -0 detect-secrets scan --baseline .secrets.baseline
          detect-secrets audit --report --fail-on-unaudited .secrets.baseline || true
