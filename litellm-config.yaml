model_list:
  # \u2500\u2500 PRIMARY PAID tier \u2500\u2500
  - model_name: grok-4-1-fast-reasoning
    litellm_params:
      model: xai/grok-4-1-fast-reasoning
      api_key: os.environ/XAI_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 45

  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: os.environ/OPENAI_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 30

  - model_name: gemini-2.5-flash
    litellm_params:
      model: gemini/gemini-2.5-flash
      api_key: os.environ/GEMINI_API_KEY
      temperature: 0.4
      max_tokens: 512
      rpm: 60

  # \u2500\u2500 FREE via OpenRouter (fallback tier) \u2500\u2500
  - model_name: kimi-k2-instruct
    litellm_params:
      model: openrouter/moonshotai/kimi-k2-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: magistral-small
    litellm_params:
      model: openrouter/mistralai/magistral-small-2506
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: gemma-3n-e4b
    litellm_params:
      model: openrouter/google/gemma-3n-e4b-it
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: qwen3-coder
    litellm_params:
      model: openrouter/qwen/qwen3-coder-480b-a35b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: llamaguard-vlm
    litellm_params:
      model: openrouter/meta-llama/llama-guard-4-12b
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  # \u2500\u2500 Stable Gemini fallback \u2500\u2500
  - model_name: gemini-1.5-flash
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: os.environ/GEMINI_API_KEY
      temperature: 0.4
      max_tokens: 512
      rpm: 60

general_settings:
  master_key: sk-1234
  rate_limit_alerts: false
  log_level: INFO

router_settings:
  # Hard fallbacks when a model errors out (503, timeout, etc.)
  fallbacks:
    - gemini-2.5-flash:
        - gemini-1.5-flash
        - gpt-4o
        - grok-4-1-fast-reasoning
        - qwen3-coder
    - gpt-4o:
        - gemini-2.5-flash
        - grok-4-1-fast-reasoning
        - magistral-small
        - gemma-3n-e4b
    - grok-4-1-fast-reasoning:
        - gpt-4o
        - gemini-2.5-flash
        - kimi-k2-instruct
        - qwen3-coder
