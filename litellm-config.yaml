model_list:
  # ── OpenRouter Free Router (auto-picks working free models) ──
  - model_name: openrouter/free
    litellm_params:
      model: openrouter/free
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 30

  # ── OpenRouter Claude 3.5 Sonnet (Replaces broken Kie) ──
  - model_name: claude-sonnet
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.3
      max_tokens: 1024

  # Legacy alias (now points to OpenRouter)
  - model_name: gemini-3-flash
    litellm_params:
      model: openrouter/anthropic/claude-3.5-sonnet
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.3
      max_tokens: 512

  # ── OpenRouter models ──
  - model_name: gpt-4o
    litellm_params:
      model: openrouter/openai/gpt-4o
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 30

  - model_name: kimi-k2-instruct
    litellm_params:
      model: openrouter/moonshotai/kimi-k2
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: magistral-small
    litellm_params:
      model: openrouter/mistralai/magistral-small-2506
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: llama-3-8b
    litellm_params:
      model: openrouter/meta-llama/llama-3-8b-instruct
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

  - model_name: gemma-2b
    litellm_params:
      model: openrouter/google/gemma-2b-it
      api_key: os.environ/OPENROUTER_API_KEY
      temperature: 0.4
      max_tokens: 256
      rpm: 20

general_settings:
  master_key: os.environ/LITELLM_API_KEY
  rate_limit_alerts: false
  log_level: INFO

router_settings:
  fallbacks:
    # PRIMARY: Kie Sonnet 4.6 → OpenRouter safety net
    - claude-sonnet:
        - openrouter/free
        - kimi-k2-instruct
    - gemini-3-flash:
        - claude-sonnet
        - openrouter/free
        - kimi-k2-instruct
    # General: OpenRouter free → specific models
    - openrouter/free:
        - kimi-k2-instruct
        - gpt-4o
        - llama-3-8b
    - gpt-4o:
        - openrouter/free
        - kimi-k2-instruct
        - magistral-small
        - llama-3-8b
    - kimi-k2-instruct:
        - openrouter/free
        - gpt-4o
    - magistral-small:
        - openrouter/free
        - kimi-k2-instruct
