events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=sse:10m rate=10r/s;

    upstream fastapi_backend {
        server ai-trading-backend:8000;
    }

    server {
        listen 80;
        server_name _;

        # Frontend default: /api/backend/trading/* -> /trading/* (matches Vite + Express dev proxy)
        location /api/backend/trading/stream {
            limit_req zone=sse burst=5 nodelay;
            proxy_pass http://fastapi_backend/trading/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        location /api/backend/ {
            limit_req zone=api burst=50 nodelay;
            rewrite ^/api/backend/(.*)$ /$1 break;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Direct backend routes (news, market-data) — same paths on FastAPI
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ops / health (optional convenience URLs on port 80/8081)
        location = /health {
            proxy_pass http://fastapi_backend/health;
        }

        location /docs {
            proxy_pass http://fastapi_backend/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # InfluxDB proxy (internal dashboards / tooling)
        location /api/influxdb/ {
            proxy_pass http://vps-influxdb:8086/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Grafana: set GRAFANA_UPSTREAM in compose or replace host (avoid hard-coded LAN IPs)
        # location /grafana/ {
        #     proxy_pass http://grafana:3000/;
        # }

        # Frontend static files (catch-all at end)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
