events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Docker embedded DNS — re-resolve container IPs after backend restarts (prevents 502)
    resolver 127.0.0.11 valid=10s ipv6=off;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=sse:10m rate=10r/s;

    server {
        listen 80;
        server_name _;

        # Frontend default: /api/backend/trading/* -> /trading/* (matches Vite + Express dev proxy)
        location /api/backend/trading/stream {
            limit_req zone=sse burst=5 nodelay;
            set $backend_upstream ai-trading-backend:8000;
            proxy_pass http://$backend_upstream/trading/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            proxy_buffering off;
            proxy_read_timeout 86400s;
        }

        location /api/backend/ {
            limit_req zone=api burst=50 nodelay;
            set $backend_upstream ai-trading-backend:8000;
            rewrite ^/api/backend/(.*)$ /$1 break;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Direct backend routes (news, market-data, historical, telemetry)
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            set $backend_upstream ai-trading-backend:8000;
            proxy_pass http://$backend_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Ops / health (optional convenience URLs on port 80/8081)
        location = /health {
            set $backend_upstream ai-trading-backend:8000;
            proxy_pass http://$backend_upstream/health;
        }

        location /docs {
            set $backend_upstream ai-trading-backend:8000;
            proxy_pass http://$backend_upstream/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        # InfluxDB is internal-only. Never proxy its API to the public
        # dashboard: bucket/query/write APIs must stay on the Docker network.
        location /api/influxdb/ {
            return 404;
        }

        # Grafana (sub-path; also reachable on :3000 internally)
        location /grafana/ {
            set $grafana_upstream ai-trading-grafana:3000;
            proxy_pass http://$grafana_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Frontend static files (catch-all at end)
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
