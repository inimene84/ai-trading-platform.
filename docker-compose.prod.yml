services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-trading-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      OLLAMA_BASE_URL: http://litellm:4000
      PAPER_TRADING: false
      ACTIVE_BROKER: binance_futures
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      BINANCE_TESTNET: false
      BINANCE_DRY_RUN: false
      DRY_RUN_ALL: false
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      PERSONA_LLM_PROVIDER: litellm
      PERSONA_LLM_MODEL: gemini-3-flash
      GROQ_API_KEY: sk-1234 # LiteLLM master key
      PERSONA_LLM_BASE_URL: http://litellm:4000/v1
      REDIS_URL: redis://redis:6379/0
      # Safety: disable risk guard during testing (re-enable for live trading by setting DISABLE_RISK_GUARD=false in .env)
      DISABLE_RISK_GUARD: ${DISABLE_RISK_GUARD:-true}
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 6G
        reservations:
          cpus: 0.5
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    networks:
      - trading-net
    ports:
      - "8001:8000"
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-trading-litellm
    environment:
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      KIE_API_KEY: ${KIE_API_KEY:-}
      KIE_BEARER_TOKEN: "Bearer ${KIE_API_KEY:-}"
      LITELLM_MODEL_FALLBACK: true
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-1234}
    command: --config /tmp/litellm-config.yaml --port 4000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - 4001:4000
    volumes:
      - ./litellm-config.yaml:/tmp/litellm-config.yaml:ro
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.25'
          memory: 256M
  redis:
    image: redis:7-alpine
    container_name: ai-trading-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    restart: unless-stopped
    volumes:
      - redis-data:/data
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.05'
          memory: 64M
  nginx:
    image: nginx:alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - 8081:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 32M
networks:
  trading-net: 
volumes:
  app-data: 
  app-logs: 
  redis-data:
