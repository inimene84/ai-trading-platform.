services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai-trading-backend
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONPATH: /app
      OLLAMA_BASE_URL: http://litellm:4000
      PAPER_TRADING: false
      ACTIVE_BROKER: binance_futures
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      BINANCE_TESTNET: false
      BINANCE_DRY_RUN: false
      DRY_RUN_ALL: false
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      PERSONA_LLM_PROVIDER: litellm
      PERSONA_LLM_MODEL: claude-sonnet
      GROQ_API_KEY: sk-1234 # LiteLLM master key
      PERSONA_LLM_BASE_URL: http://litellm:4000/v1
      KIE_MODEL: claude-sonnet-4-6
      # Safety: risk guard ENABLED by default. Only disable for explicit testing by setting DISABLE_RISK_GUARD=true in .env
      DISABLE_RISK_GUARD: ${DISABLE_RISK_GUARD:-false}
      # MiCA/EEA: trade USDC-margined perpetuals (USDT restricted for EU users).
      # 9 USDC pairs (DOT has no USDC perp). Override via TRADING_SYMBOLS in .env.
      TRADING_SYMBOLS: ${TRADING_SYMBOLS:-BTCUSDC,ETHUSDC,SOLUSDC,BNBUSDC,XRPUSDC,ADAUSDC,AVAXUSDC,LINKUSDC,UNIUSDC}
      # Liquidity floor. 3M keeps all 9 USDC majors (USDC books are thinner than
      # USDT twins; 50M would silently drop ADA/AVAX/LINK/UNI). Override in .env.
      MIN_24H_QUOTE_VOLUME_USDT: ${MIN_24H_QUOTE_VOLUME_USDT:-3000000}
      # Payoff geometry (leak #4). TRAIL_ATR_MULT MUST be < TRAIL_ACTIVATION_ATR
      # or the trail locks a loss at activation and caps winners below the 2.5R
      # TP -> refunded margin bleeds out. 0.8 banks ~+1.2R on a 2-ATR reversal.
      SL_ATR_MULT: ${SL_ATR_MULT:-1.0}
      TP_ATR_MULT: ${TP_ATR_MULT:-2.5}
      TRAIL_ACTIVATION_ATR: ${TRAIL_ACTIVATION_ATR:-1.0}
      TRAIL_ATR_MULT: ${TRAIL_ATR_MULT:-0.8}
      # Fee-churn fix: post-only (GTX) maker entries with MARKET fallback.
      # OFF by default (fail-safe). Set true to cut entry fees 0.05%->0.02%.
      MAKER_ENTRY_ENABLED: ${MAKER_ENTRY_ENABLED:-false}
      MAKER_WAIT_SEC: ${MAKER_WAIT_SEC:-30}
      INFLUXDB_URL: http://vps-influxdb:8086
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-hedge-fund}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-trading-system}
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: 1.5
          memory: 6G
        reservations:
          cpus: 0.5
          memory: 2G
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    volumes:
      - app-data:/app/data
      - app-logs:/app/logs
    networks:
      - trading-net
    ports:
      - "8001:8000"
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: ai-trading-litellm
    environment:
      GEMINI_API_KEY: ${GOOGLE_API_KEY}
      XAI_API_KEY: ${XAI_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      KIE_API_KEY: ${KIE_API_KEY:-}
      KIE_BEARER_TOKEN: "Bearer ${KIE_API_KEY:-}"
      LITELLM_MODEL_FALLBACK: true
      LITELLM_MASTER_KEY: ${LITELLM_API_KEY:-sk-1234}
    command: --config /tmp/litellm-config.yaml --port 4000
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: 5
    restart: unless-stopped
    ports:
      - 4001:4000
    volumes:
      - ./litellm-config.yaml:/tmp/litellm-config.yaml:ro
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 3G
        reservations:
          cpus: '0.25'
          memory: 256M
  nginx:
    image: nginx:alpine
    container_name: ai-trading-nginx
    restart: unless-stopped
    ports:
      - 8081:80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - trading-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 32M
  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: vps-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant-storage:/qdrant/storage
    networks:
      - trading-net
  influxdb:
    image: influxdb:2.8
    container_name: vps-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      # Reuse Hostinger stack volume with historical trading metrics
      - influxdb-2-ksyg_influxdb2-data:/var/lib/influxdb2
      - influxdb-2-ksyg_influxdb2-config:/etc/influxdb2
    networks:
      - trading-net
  grafana:
    image: grafana/grafana:11.4.0
    container_name: ai-trading-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
    restart: unless-stopped
    volumes:
      - grafana-storage:/var/lib/grafana
    depends_on:
      - influxdb
    networks:
      - trading-net
  mcp-server:
    build:
      context: .
      dockerfile: mcp_server/Dockerfile
    container_name: ai-trading-mcp
    restart: unless-stopped
    ports:
      - "9100:9100"
    environment:
      - BACKEND_BASE_URL=http://ai-trading-backend:8000
      - BACKEND_API_PREFIX=/api
      - MCP_TRANSPORT=http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=9100
    networks:
      - trading-net
    depends_on:
      - backend
  sentry-watchdog:
    build:
      context: .
      dockerfile: sentry_watchdog/Dockerfile
    container_name: ai-trading-sentry-watchdog
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:8000
      SENTRY_POLL_INTERVAL_SEC: ${SENTRY_POLL_INTERVAL_SEC:-10}
      SENTRY_FAIL_THRESHOLD: ${SENTRY_FAIL_THRESHOLD:-3}
      SENTRY_EMERGENCY_COOLDOWN_SEC: ${SENTRY_EMERGENCY_COOLDOWN_SEC:-300}
      SENTRY_STATE_DIR: /app/data/sentry
      ACTIVE_BROKER: ${ACTIVE_BROKER:-binance_futures}
      BINANCE_API_KEY: ${BINANCE_API_KEY}
      BINANCE_SECRET_KEY: ${BINANCE_SECRET_KEY}
      BINANCE_TESTNET: ${BINANCE_TESTNET:-false}
      PAPER_TRADING: ${PAPER_TRADING:-false}
      BINANCE_DRY_RUN: ${BINANCE_DRY_RUN:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      SENTRY_WATCHDOG_TOKEN: ${SENTRY_WATCHDOG_TOKEN}
      SENTRY_AUTO_RESUME_ENABLED: ${SENTRY_AUTO_RESUME_ENABLED:-true}
      SENTRY_RESUME_AFTER_SEC: ${SENTRY_RESUME_AFTER_SEC:-120}
      SENTRY_RESUME_HEALTH_CHECKS: ${SENTRY_RESUME_HEALTH_CHECKS:-6}
      SENTRY_STARTUP_GRACE_SEC: ${SENTRY_STARTUP_GRACE_SEC:-120}
    volumes:
      - app-data:/app/data
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - trading-net
    logging:
      driver: json-file
      options:
        max-size: 5m
        max-file: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
networks:
  trading-net:
    external: true
volumes:
  app-data:
  app-logs:
  grafana-storage:
  influxdb-2-ksyg_influxdb2-data:
    external: true
  influxdb-2-ksyg_influxdb2-config:
    external: true
