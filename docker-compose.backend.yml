version: "3.9"

services:
  # ── PostgreSQL Database ────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: trading_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading_pass}
      POSTGRES_DB: ${POSTGRES_DB:-trading_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-trading_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: trading_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Database
      DATABASE_URL: postgresql://${POSTGRES_USER:-trading_user}:${POSTGRES_PASSWORD:-trading_pass}@db:5432/${POSTGRES_DB:-trading_db}

      # Broker Keys — fill these in your .env file on the VPS
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_TESTNET: ${BINANCE_TESTNET:-true}

      CTRADER_CLIENT_ID: ${CTRADER_CLIENT_ID:-}
      CTRADER_CLIENT_SECRET: ${CTRADER_CLIENT_SECRET:-}
      CTRADER_ACCESS_TOKEN: ${CTRADER_ACCESS_TOKEN:-}
      CTRADER_ENV: ${CTRADER_ENV:-demo}

      # LLM API Keys
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}

      # Optional
      INFLUXDB_URL: ${INFLUXDB_URL:-}
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-}
      INFLUXDB_ORG: ${INFLUXDB_ORG:-}
      INFLUXDB_BUCKET: ${INFLUXDB_BUCKET:-trading}

    depends_on:
      db:
        condition: service_healthy
    volumes:
      - backend_data:/app/backend/data

# ── Named Volumes ──────────────────────────────────────────────────────────
volumes:
  postgres_data:
  backend_data:
